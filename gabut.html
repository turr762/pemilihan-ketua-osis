<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pertanyaan Penting</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #ffe4e1;
            text-align: center;
        }

        h1 {
            color: #d63384;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 25px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            transition: transform 0.2s ease;
        }

        #btnYes {
            background-color: #ff4d6d;
            color: white;
            z-index: 10;
        }

        #btnNo {
            background-color: #adb5bd;
            color: white;
        }

        .hidden {
            display: none;
        }

        #success-msg {
            font-size: 2rem;
            color: #d63384;
        }
    </style>
</head>
<body>

    <div id="quiz">
        <h1>Kamu sayang aku gak? 🥺</h1>
        <div class="buttons">
            <button id="btnYes">Iya!</button>
            <button id="btnNo">Enggak</button>
        </div>
    </div>

    <div id="celebration" class="hidden">
        <h1>Yeeey! Aku juga sayang kamu! ❤️✨</h1>
        <p style="font-size: 50px;">🥰🌹</p>
    </div>

    <script>
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        const quiz = document.getElementById('quiz');
        const celebration = document.getElementById('celebration');

        let scale = 1;

        btnNo.addEventListener('click', () => {
            // Perbesar tombol Iya setiap kali tombol Enggak dipencet
            scale += 0.5; 
            btnYes.style.transform = `scale(${scale})`;
            
            // Opsional: Geser sedikit tombol Enggak biar makin susah dipencet
            const x = Math.random() * 20 - 10;
            const y = Math.random() * 20 - 10;
            btnNo.style.transform = `translate(${x}px, ${y}px)`;
        });

        btnYes.addEventListener('click', () => {
            quiz.classList.add('hidden');
            celebration.classList.remove('hidden');
            document.body.style.backgroundColor = "#ffc1cc";
        });
    </script>
</body>
</html>
